# Dev-окружение REPORTIX Retail.
# Запуск:  docker compose up --build
# Backend:  http://localhost:8000/api/health/   Admin: http://localhost:8000/admin/
# Frontend: http://localhost:5173

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:16-alpine
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reportix}
      POSTGRES_USER: ${POSTGRES_USER:-reportix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reportix}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reportix}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    logging: *default-logging
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  backend:
    build: ./backend
    logging: *default-logging
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - media_data:/app/media
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-change-me}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      DATABASE_URL: postgres://${POSTGRES_USER:-reportix}:${POSTGRES_PASSWORD:-reportix}@db:5432/${POSTGRES_DB:-reportix}
      REDIS_URL: redis://redis:6379/1
      RQ_REDIS_URL: redis://redis:6379/1
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: ./backend
    logging: *default-logging
    command: python manage.py rqworker default
    volumes:
      - ./backend:/app
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-change-me}
      DEBUG: ${DEBUG:-True}
      DATABASE_URL: postgres://${POSTGRES_USER:-reportix}:${POSTGRES_PASSWORD:-reportix}@db:5432/${POSTGRES_DB:-reportix}
      REDIS_URL: redis://redis:6379/1
      RQ_REDIS_URL: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    logging: *default-logging
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
  media_data:
